<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0e1a">
  <title>Offline — CrisisConnect</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0e1a;color:#E2E8F0;font-family:-apple-system,sans-serif;text-align:center;padding:2rem}
    .icon{font-size:4rem;margin-bottom:1rem}
    h1{font-size:1.5rem;margin-bottom:0.5rem;color:#ff3d57}
    p{color:#8B949E;max-width:400px;margin:0 auto 1.5rem}
    .queue-info{background:rgba(255,61,87,0.1);border:1px solid rgba(255,61,87,0.2);border-radius:8px;padding:1rem;margin:1rem auto;max-width:350px;font-size:0.85rem}
    .retry-btn{padding:0.75rem 2rem;background:#ff3d57;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem}
    .retry-btn:hover{background:#e6354e}
  </style>
</head>
<body>
  <div>
    <div class="icon">⚡</div>
    <h1>You Are Offline</h1>
    <p>CrisisConnect is running in field mode. Your actions are queued locally and will sync when connectivity returns.</p>
    <div class="queue-info">
      <strong>Queued Actions:</strong> <span id="queueCount">0</span><br>
      <small>All data is safe in local storage.</small>
    </div>
    <button class="retry-btn" onclick="location.reload()">Retry Connection</button>
  </div>
  <script>
    try {
      const queue = JSON.parse(localStorage.getItem('crisisconnect_offline_queue') || '[]');
      document.getElementById('queueCount').textContent = queue.length;
    } catch(e) {}
  </script>
</body>
</html>
